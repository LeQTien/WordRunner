<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Word by Word</title>
    <link rel="stylesheet" href="/WordRunner/print.css">
</head>
<body>
    <h2>Word Runner</h2>
    <section class="upper">
        <div id="output"></div>
    </section>

    <section class="lower">

        <textarea id="inputParagraph" placeholder="Enter your text here..." cols="140" rows="15"></textarea><br>
        <button id="controlButton">Play</button>
        <button id="pauseButton" disabled>Pause</button>
        <!-- <div id="output"></div> -->
        <input type="number" id="intervalInput" placeholder="Enter interval time (ms)">
        <button id="setIntervalButton">Set Interval</button>
        <input type="number" id="DisplayingTextInput" placeholder="Enter The Displaying text number">
        <button id="setDisplayingofTextNumberButton">Set The Displaying text number</button>
    </section>



    
    <p class="credit">Created by Le Q. Tien</p>
    

    <script src="/WordRunner/print.js"></script>
</body>
</html>
