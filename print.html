<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Word by Word</title>
    <link rel="stylesheet" href="print.css">
</head>
<body>
    <div class="container">
        <h2>Word Runner</h2>

        <section class="upper">
            <div id="output"></div>
        </section>

        <section class="lower">
            <textarea id="inputParagraph" placeholder="Enter your text here..."></textarea>

            <div class="controls">
                <button id="controlButton">Play</button>
                <button id="pauseButton" disabled>Pause</button>

                <input type="number" id="intervalInput" placeholder="Interval (ms)">
                <button id="setIntervalButton">Set</button>

                <input type="number" id="DisplayingTextInput" placeholder="Words">
                <button id="setDisplayingofTextNumberButton">Set</button>
            </div>
        </section>

        <p class="credit">Created by Le Q. Tien</p>
    </div>

    <script src="print.js"></script>
</body>
</html>
